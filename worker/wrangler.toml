name = "andromeda-rituels"
main = "index.js"
compatibility_date = "2024-10-01"
compatibility_flags = ["nodejs_compat"]

# Variables d'environnement (valeurs réelles à mettre via `wrangler secret put`)
# Ne jamais mettre les vraies valeurs ici — ce fichier est commité dans git

[vars]
SHOPIFY_STORE_URL = "andromeda-paris.myshopify.com"
SHOPIFY_API_VERSION = "2024-10"
ALLOWED_ORIGIN = "https://andromeda-paris.myshopify.com"

[[routes]]
pattern = "www.andromedaparis.com/llms.txt"
zone_name = "andromedaparis.com"

# Secrets à configurer via CLI (jamais dans ce fichier) :
#   wrangler secret put SHOPIFY_ADMIN_API_TOKEN
